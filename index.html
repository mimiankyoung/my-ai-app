<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유아 행동 문제 해결 가이드</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#FFF8F5;
    font-family:'Arial';
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.title h1{
    color:#ff7f7f;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff9aa2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff7b86;
}

#result{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>👶 유아 행동 문제 해결 가이드</h1>
<p>유아 행동에 대한 원인과 지도 방법을 확인해보세요.</p>
</div>

<div class="card">

<label>행동 영역 선택</label>

<select id="category">
<option value="">선택하세요</option>
<option value="peer">또래관계</option>
<option value="emotion">감정조절</option>
<option value="rule">규칙생활</option>
<option value="social">사회성</option>
</select>

<br><br>

<label>행동 선택</label>

<select id="behavior">
<option value="">먼저 영역을 선택하세요</option>
</select>

<button onclick="showGuide()">
가이드 보기
</button>

</div>

<div id="result">

📌 행동을 선택하면 가이드가 나타납니다.

</div>

</div>

<script>

const data = {

peer:[
"친구를 때림",
"친구 물건을 뺏음",
"친구를 놀림"
],

emotion:[
"떼쓰기",
"울음이 잦음",
"화를 참지 못함"
],

rule:[
"정리정돈 안 함",
"차례 기다리지 못함",
"수업 중 돌아다님"
],

social:[
"혼자 놀이함",
"발표를 두려워함",
"낯가림이 심함"
]

};

const category =
document.getElementById("category");

const behavior =
document.getElementById("behavior");

category.addEventListener("change", function(){

behavior.innerHTML = "";

data[this.value].forEach(item => {

const option =
document.createElement("option");

option.textContent = item;

behavior.appendChild(option);

});

});

function showGuide(){

document.getElementById("result").innerHTML = `
<h2>${behavior.value}</h2>
<p>다음 단계에서 상세 가이드를 추가할 예정입니다.</p>
`;

}

</script>

</body>
</html>
