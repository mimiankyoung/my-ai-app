특히 놀이, 간식, 교사의 관심, 인기 있는 장난감 등 자신이 원하는 대상이 있을 때 기다림에 대한 어려움이 더욱 크게 나타날 수 있음.<br><br>

따라서 기다리기 어려움은 단순한 버릇이나 고집의 문제가 아니라 자기조절 능력과 실행기능이 발달하는 과정에서 나타나는 행동으로 이해할 필요가 있음.

<br><br>

<b>🔍 가능한 원인</b><br>

□ 원하는 것을 빨리 얻고 싶음<br>
□ 차례 개념이 아직 충분히 형성되지 않음<br>
□ 시간 개념 발달 미숙<br>
□ 충동조절 능력 부족<br>
□ 기다림 경험 부족<br>
□ 흥미가 높은 활동에 대한 강한 욕구<br>
□ 피곤하거나 배고픔<br>
□ 교사의 관심을 받고 싶음

<br><br>

<b>👩‍🏫 교사 핵심 가이드</b><br>

<b>1단계 : 기다림이 어려운 것이 자연스러운 발달 과정임을 이해하기</b><br>
기다리지 못한다고 해서 고집이 세거나 문제행동으로 단정하지 않음.<br>
먼저 유아의 발달 수준을 고려하여 접근함.

<br><br>

<b>2단계 : 기다려야 하는 이유를 알려주기</b><br>
단순히 "기다려"라고 말하기보다 왜 기다려야 하는지 설명해줌.

<br><br>

예시<br>
"지금은 친구 차례야."<br>
"친구가 다 사용하면 네 차례가 와."

<br><br>

<b>3단계 : 기다림을 시각적으로 보여주기</b><br>
유아는 눈에 보이지 않는 시간을 이해하기 어려움.<br>
시각 자료를 활용하면 기다림을 더 쉽게 받아들일 수 있음.

<br><br>

예시<br>
모래시계 사용하기<br>
순서 카드 활용하기<br>
차례표 붙이기

<br><br>

<b>4단계 : 짧은 기다림부터 성공 경험 만들기</b><br>
처음부터 오랜 기다림을 요구하지 않고 짧은 기다림부터 연습함.

<br><br>

예시<br>
10초 기다리기 → 30초 → 1분 순으로 늘리기

<br><br>

<b>5단계 : 기다리는 동안 할 수 있는 행동 알려주기</b><br>
기다림 자체보다 기다리는 동안 무엇을 해야 하는지 알려주는 것이 중요함.

<br><br>

예시<br>
"친구를 응원해보자."<br>
"책을 보며 기다릴까?"<br>
"선생님 옆에서 기다려보자."

<br><br>

<b>6단계 : 기다린 행동 즉시 인정하기</b><br>
결과보다 기다리기 위해 노력한 행동을 칭찬함.

<br><br>

예시<br>
"차례를 기다렸구나."<br>
"조금 힘들었는데 잘 참았네."<br>
"기다려줘서 고마워."

<br><br>

<b>🚫 하면 안 되는 말</b><br>

❌ 왜 이렇게 참을성이 없어?<br>
❌ 조금만 기다리라니까.<br>
❌ 친구들은 다 기다리는데 왜 너만 그래?<br>
❌ 자꾸 그러면 못 해.<br>
❌ 떼쓰지 마.

<br><br>

<b>✅ 추천 표현</b><br>

"기다리기 힘들 수 있지."<br>
"곧 네 차례가 올 거야."<br>
"조금만 더 기다려보자."<br>
"기다리는 동안 무엇을 할까?"<br>
"기다려줘서 고마워."

<br><br>

<b>💬 부모 상담 예시</b><br>

최근 활동 중 자신의 차례를 기다리는 것을 어려워하는 모습이 관찰되고 있습니다.<br>
현재는 기다림을 시각적으로 안내하고 짧은 성공 경험을 제공하며 자기조절 능력을 키울 수 있도록 지원하고 있습니다.<br>
가정에서도 순서가 있는 놀이를 통해 기다리는 경험을 자연스럽게 연습해주시면 도움이 됩니다.

<br><br>

<b>📚 발달 이론</b><br>

<b>Piaget (피아제)</b><br>
전조작기 유아는 현재 자신의 욕구와 생각에 집중하는 경향이 강함.<br>
따라서 자신의 차례가 아니더라도 즉시 참여하고 싶어 할 수 있음.

<br><br>

<b>Erikson (에릭슨)</b><br>
자율성과 주도성이 발달하는 시기로 자신의 의지가 반영되기를 원함.<br>
원하는 것이 즉시 이루어지지 않을 때 강한 좌절감을 느낄 수 있음.

<br><br>

<b>Vygotsky (비고츠키)</b><br>
자기조절 능력은 성인과의 상호작용을 통해 발달함.<br>
교사가 기다리는 방법을 반복적으로 모델링하고 지원할수록 기다림 능력이 향상될 수 있음.

<br><br>

<b>🧠 실행기능 관점</b><br>

기다리기는 실행기능의 중요한 요소 중 하나인 충동조절(Inhibitory Control)과 관련됨.<br>
유아는 발달 과정상 충동을 즉시 억제하는 능력이 아직 충분히 발달하지 않았기 때문에 기다리는 것을 어려워할 수 있음.

<br><br>

<b>🌱 초임교사 체크 포인트</b><br>

✔ 기다리지 못하는 행동보다 기다리기 어려운 이유를 먼저 이해하기<br>

✔ '기다려'보다 기다리는 방법을 알려주기<br>

✔ 기다림을 눈으로 볼 수 있게 만들기<br>

✔ 짧은 성공 경험부터 제공하기<br>

✔ 기다린 행동을 적극적으로 칭찬하기<br>

✔ 기다림이 필요한 일과를 반복적으로 경험하게 하기
`,
}
};
