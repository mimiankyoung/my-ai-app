function showGuide(){

const category = document.getElementById("category").value;
const behavior = document.getElementById("behavior").value;
const result = document.getElementById("result");

if(!category || !behavior){
result.innerHTML = "<div class='result'>영역과 행동을 모두 선택해주세요.</div>";
return;
}

if(!data[category] || !data[category][behavior]){
result.innerHTML = "<div class='result'>해당 가이드가 없습니다.</div>";
return;
}

result.innerHTML =
"<div class='result'>" + data[category][behavior] + "</div>";
}
